#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - fail2ban
  - git

users:
  - default
  - name: deploy
    lock_passwd: true
    shell: /bin/bash
    ssh_authorized_keys:
      - REPLACE_WITH_DEPLOY_PUBLIC_KEY

write_files:
  - path: /etc/ssh/sshd_config.d/99-elx-hardening.conf
    permissions: "0644"
    content: |
      PasswordAuthentication no
      PermitRootLogin no

runcmd:
  - curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
  - sh /tmp/get-docker.sh
  - usermod -aG docker deploy
  - install -d -o deploy -g deploy -m 0750 /opt/elx
  - sudo -u deploy git clone https://github.com/Mkots/elx.git /opt/elx
  - systemctl enable --now docker
  - systemctl restart ssh

final_message: "ELX host provisioning completed"
