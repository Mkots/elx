name: elx-dev

services:
  app:
    build:
      context: .
      target: build
    command: ["task", "dev"]
    environment:
      DATABASE_URL: postgres://elx:elx@postgres:5432/elx
      ENVIRONMENT: development
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - deno_cache:/deno-dir
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_DB: elx
      POSTGRES_PASSWORD: elx
      POSTGRES_USER: elx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elx -d elx"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:5
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  deno_cache:
  postgres_data:
