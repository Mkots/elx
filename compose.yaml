name: elx

services:
  app:
    image: ${APP_IMAGE:?Set APP_IMAGE}:${APP_TAG:?Set APP_TAG}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ENVIRONMENT: production
      PORT: "8000"
      SENTRY_DSN: ${SENTRY_DSN:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "deno",
          "eval",
          "const r=await fetch('http://127.0.0.1:8000/health');Deno.exit(r.ok?0:1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 10m

  postgres:
    image: postgres:17.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 10m

  caddy:
    image: caddy:2.10.2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_config:/config
      - caddy_data:/data
    depends_on:
      app:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 10m

volumes:
  caddy_config:
  caddy_data:
  postgres_data:
