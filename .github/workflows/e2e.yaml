name: E2E

on:
  workflow_call:

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-24.04
    container: mcr.microsoft.com/playwright:v1.61.0-noble
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: elx_test
          POSTGRES_USER: elx
          POSTGRES_PASSWORD: elx
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://elx:elx@postgres:5432/elx_test
      DENO_KV_PATH: .data/elx.sqlite3
    steps:
      - uses: actions/checkout@v7

      - name: Cache Deno
        uses: actions/cache@v6
        with:
          path: |
            ~/.deno
            .deno-cache
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock') }}

      - name: Install unzip for setup-deno
        run: apt-get update && apt-get install -y --no-install-recommends unzip

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.8.3

      - name: Migrate and seed static data
        run: deno task seed:e2e

      - name: Run E2E tests
        run: deno task e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
