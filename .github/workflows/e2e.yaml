name: E2E

on:
  workflow_call:
    inputs:
      event_name:
        required: true
        type: string

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-24.04
    container: mcr.microsoft.com/playwright:v1.61.0-noble
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: elx_test
          POSTGRES_USER: elx
          POSTGRES_PASSWORD: elx
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://elx:elx@postgres:5432/elx_test
      DENO_DIR: .deno-cache
      PLAYWRIGHT_RETRIES: ${{ inputs.event_name == 'pull_request' && '1' || '2' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache Deno
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .deno-cache
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock') }}
          restore-keys: |
            deno-${{ runner.os }}-

      - name: Install unzip for mise
        run: apt-get update && apt-get install -y --no-install-recommends unzip

      - uses: jdx/mise-action@5083fe46898c414b2475087cc79da59e7da859e8 # v2.1.11

      - name: Migrate and seed static data
        run: deno task seed:e2e

      - name: Run E2E tests
        run: deno task e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
