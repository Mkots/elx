name: "Copilot Setup Steps"

# Run automatically when this file changes so setup failures are caught early,
# and allow manual validation from the Actions tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Job name MUST be `copilot-setup-steps` to be picked up by the agent.
  copilot-setup-steps:
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    env:
      # Keep Deno's module cache in the workspace so it can be shared via
      # actions/cache (mirrors the DENO_DIR used by every CI job).
      DENO_DIR: .deno-cache

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # ── Deno ────────────────────────────────────────────────────────────────

      - name: Cache Deno modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .deno-cache
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock') }}
          restore-keys: |
            deno-${{ runner.os }}-

      - name: Set up Deno
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Install Deno dependencies
        # Warms the DENO_DIR cache so `deno task ci` (fmt:check, lint, check,
        # test:coverage) can run immediately without a network round-trip.
        run: deno install --frozen
