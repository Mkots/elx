name: Wiki Sync

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - docs/**
      - scripts/build_wiki.ts
      - scripts/sync-wiki.sh
      - .github/workflows/wiki-sync.yaml

permissions:
  contents: read

jobs:
  sync:
    name: Sync docs to GitHub wiki
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: 2.8.3

      - name: Clone wiki repository
        env:
          WIKI_SYNC_TOKEN: ${{ secrets.WIKI_SYNC_TOKEN }}
        run: |
          if [ -z "$WIKI_SYNC_TOKEN" ]; then
            echo "WIKI_SYNC_TOKEN secret is required" >&2
            exit 1
          fi

          git clone \
            "https://x-access-token:${WIKI_SYNC_TOKEN}@github.com/Mkots/elx.wiki.git" \
            wiki

      - name: Sync docs into wiki checkout
        run: bash scripts/sync-wiki.sh docs wiki

      - name: Commit and push wiki changes
        working-directory: wiki
        run: |
          if git diff --quiet --exit-code; then
            echo "Wiki is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Sync wiki from docs (${GITHUB_SHA})"
          git push origin HEAD
