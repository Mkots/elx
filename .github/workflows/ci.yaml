name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: ./.github/workflows/quality.yaml
    timeout-minutes: 10

  e2e:
    uses: ./.github/workflows/e2e.yaml
    timeout-minutes: 10

  requirements:
    uses: ./.github/workflows/requirements.yaml
    timeout-minutes: 10

  image:
    needs:
      - quality
      - e2e
      - requirements
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/master' ||
      startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/image.yaml
    timeout-minutes: 10

  deploy:
    needs:
      - image
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/master' ||
      startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/deploy.yaml
    with:
      image: ${{ needs.image.outputs.image }}
      tag: ${{ needs.image.outputs.tag }}
    secrets: inherit
