name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  quality:
    uses: ./.github/workflows/quality.yaml

  e2e:
    uses: ./.github/workflows/e2e.yaml

  requirements:
    uses: ./.github/workflows/requirements.yaml

  image:
    needs:
      - quality
      - e2e
      - requirements
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/image.yaml

  deploy:
    needs:
      - image
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/master' ||
      startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/deploy.yaml
    with:
      image: ${{ needs.image.outputs.image }}
      tag: ${{ needs.image.outputs.tag }}
    secrets: inherit
