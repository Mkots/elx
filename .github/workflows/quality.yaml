name: Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  quality:
    name: Deno quality gates
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.8.3

      - name: Run checks and tests
        run: deno task ci

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.lcov
