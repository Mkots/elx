name: Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  quality:
    name: Deno quality gates
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Cache Deno
        uses: actions/cache@v5
        with:
          path: |
            ~/.deno
            .deno-cache
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock') }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.8.3

      - name: Format check
        run: deno task fmt:check

      - name: Lint
        run: deno task lint

      - name: Type check
        run: deno task check

      - name: Tests with coverage
        run: deno task test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.lcov
