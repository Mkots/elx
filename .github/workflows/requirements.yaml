name: Requirements

on:
  workflow_call:

permissions:
  contents: read

env:
  SARA_VERSION: "0.9.0"

jobs:
  requirements:
    name: SARA requirements
    runs-on: ubuntu-24.04
    container: rust:1-bookworm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache SARA binary
        id: sara-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /usr/local/cargo/bin/sara
          key: sara-${{ runner.os }}-${{ env.SARA_VERSION }}

      - name: Install SARA
        if: steps.sara-cache.outputs.cache-hit != 'true'
        run: cargo install --locked --version "$SARA_VERSION" sara-cli

      - name: Validate requirement graph
        working-directory: docs/requirements
        run: sara check
