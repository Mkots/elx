name: Deploy

on:
  workflow_call:
    inputs:
      image:
        description: Fully qualified image name (without tag)
        required: true
        type: string
      tag:
        description: Image tag to deploy
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - uses: actions/checkout@v7

      - name: Prepare deployment package
        run: |
          mkdir -p deploy_dist
          cp compose.yaml deploy_dist/
          cp deploy/Caddyfile deploy_dist/

      - name: Copy config files
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy_dist/*"
          target: "/opt/elx"
          strip_components: 1

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          APP_IMAGE: ${{ inputs.image }}
          APP_TAG: ${{ inputs.tag }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
          # Application Secrets
          DOMAIN: ${{ secrets.DOMAIN }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: APP_IMAGE,APP_TAG,GHCR_TOKEN,GHCR_USERNAME,DOMAIN,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,SENTRY_DSN,ADMIN_USERNAME,ADMIN_PASSWORD
          script: |
            set -eu
            cd /opt/elx

            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            docker compose pull
            docker compose up -d postgres

            # Run migrations
            docker compose run --rm app deno task db:migrate

            docker compose up -d --remove-orphans
            docker image prune -f
