name: Deploy

on:
  workflow_call:
    inputs:
      image:
        description: Fully qualified image name (without tag)
        required: true
        type: string
      tag:
        description: Image tag to deploy
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          APP_IMAGE: ${{ inputs.image }}
          APP_TAG: ${{ inputs.tag }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: APP_IMAGE,APP_TAG,DEPLOY_PATH,GHCR_TOKEN,GHCR_USERNAME
          script: |
            set -eu
            cd "$DEPLOY_PATH"
            git pull --ff-only
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            APP_IMAGE="$APP_IMAGE" APP_TAG="$APP_TAG" docker compose pull
            APP_IMAGE="$APP_IMAGE" APP_TAG="$APP_TAG" docker compose up -d postgres
            APP_IMAGE="$APP_IMAGE" APP_TAG="$APP_TAG" docker compose run --rm app task db:migrate
            APP_IMAGE="$APP_IMAGE" APP_TAG="$APP_TAG" docker compose up -d --remove-orphans
            docker image prune -f
